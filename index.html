<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMODORO</title>
    <link rel="stylesheet" href="./estilo.css">
</head>

<body>
    <div id="header">
        <div>
            <input type="checkbox" name="darkmode" id="darkmode">
            <label for="darkmode">Modo oscuro</label>
            <div>
                <label for="">Fuentes:</label>
                <select name="opciones" id="select">
                    <option name="opciones" value="black" selected>Negro</option>
                    <option name="opciones" value="violet">Violeta</option>
                    <option name="opciones" value="green">Verde</option>
                    <option name="opciones" value="lightblue">Celeste</option>
                    <option name="opciones" value="white">Blanco</option>
                    <option name="opciones" value="yellow">Amarillo</option>
                </select>
            </div>
            <input type="checkbox" name="save_tasks" id="save_tasks" checked>
            <label for="save_tasks">Guardar tareas en local</label>
        </div>
    </div>

    <div id="principal" class="principal">
        <div id="container1">
            <h1>CRONÓMETRO</h1>
            <div>
                <label for="">Horas:</label>
                <div>
                    <input type="number" name="" id="hs" value="0">
                </div>
            </div>
            <div>
                <label for="">Minutos:</label>
                <div>
                    <input type="number" name="" id="min" value="0">
                </div>
            </div>
            <div>
                <label for="">Segundos:</label>
                <div>
                    <input type="number" name="" id="seg" value="0">
                </div>
            </div>
            <div>
                <div>
                    <label for="">Intervalo</label>
                </div>
                <div>
                    <input type="number" name="" id="interval" value="1000">
                </div>
            </div>
            <div style="display: block;">
                <input type="button" value="Iniciar" id="start">
                <input type="button" value="Detener" id="stop">
                <input type="button" value="Reiniciar" id="restart">
            </div>
            <h1 id="timer" class="tiempo">00:00:00</h1>
        </div>

        <div id="container2">
            <h1>TEMPORIZADOR</h1>
            <div style="display: block;">
                <input type="checkbox" name="hidrate" id="hidrate" checked>
                <label for="hidrate">Recordatorio: AGUA o CAFÉ</label>
            </div>
            <div>
                <label for="">Horas:</label>
                <div>
                    <input type="number" name="" id="hs_t" value="0">
                </div>
            </div>
            <div>
                <label for="">Minutos:</label>
                <div>
                    <input type="number" name="" id="min_t" value="0">
                </div>
            </div>
            <div>
                <label for="">Segundos:</label>
                <div>
                    <input type="number" name="" id="seg_t" value="0">
                </div>
            </div>
            <div>
                <div>
                    <label for="">Intervalo</label>
                </div>
                <div>
                    <input type="number" name="" id="interval_t" value="1000">
                </div>
            </div>
            <div style="display: block;">
                <input type="button" value="Iniciar" id="start_t">
                <input type="button" value="Detener" id="stop_t">
                <input type="button" value="Reiniciar" id="restart_t">
            </div>
            <h1 id="timer_t" class="tiempo">00:00:00</h1>
        </div>
    </div>

    <div id="stadistics">
        <h1>Estadísticas</h1>
        <div class="stadistic"></div>
    </div>

    <section id="task_section">
        <div id="section_id">
            <textarea name="" id="write_task" placeholder="Escribe una tarea"></textarea>
            <input type="button" value="Añadir tarea" id="btn_add_task">
        </div>
    </section>

    <section id="pomodoro_section">
        <h1 id="tasks">TAREAS</h1>
        <div id="pomodoro_tasks" class="pomodoro_tasks">
            <div id="todo" class="tareas">
                <h1>ToDo</h1>
                <div id="ToDo_tasks" class="tasks">
                </div>
            </div>
            <div id="working" class="tareas">
                <h1>Working</h1>
                <div class="tasks">
                </div>
            </div>
            <div id="finish" class="tareas">
                <h1>Finished</h1>
                <div class="tasks">
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="./cronometro.js"></script>
    <script type="module" src="./temporizador.js"></script>
    <script type="module" src="./tema.js"></script>
</body>

</html>
