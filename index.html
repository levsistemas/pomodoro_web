<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMODORO</title>
    <link rel="stylesheet" href="./estilo.css">
</head>

<body>
    <div id="header">
        <div>
            <input type="checkbox" name="darkmode" id="darkmode">
            <label for="darkmode">Modo oscuro</label>
            <div>
                <label for="">Fuentes:</label>
                <select name="opciones" id="select">
                    <option name="opciones" value="black" selected>Negro</option>
                    <option name="opciones" value="red">Rojo</option>
                    <option name="opciones" value="green">Verde</option>
                    <option name="opciones" value="blue">Azul</option>
                    <option name="opciones" value="white">Blanco</option>
                    <option name="opciones" value="yellow">Amarillo</option>
                </select>
            </div>
        </div>
    </div>
    <div id="principal" class="principal">
        <div id="container1">
            <h1>CRONÓMETRO</h1>
            <div>
                <label for="">Horas:</label>
                <div>
                    <input type="number" name="" id="hs" value="0">
                </div>
            </div>
            <div>
                <label for="">Minutos:</label>
                <div>
                    <input type="number" name="" id="min" value="0">
                </div>
            </div>
            <div>
                <label for="">Segundos:</label>
                <div>
                    <input type="number" name="" id="seg" value="0">
                </div>
            </div>
            <div>
                <div>
                    <label for="">Intervalo</label>
                </div>
                <div>
                    <input type="number" name="" id="interval" value="1000">
                </div>
            </div>
            <div style="display: block;">
                <input type="button" value="Iniciar" id="start">
                <input type="button" value="Detener" id="stop">
                <input type="button" value="Reiniciar" id="restart">
            </div>
            <h1 id="timer" class="tiempo">00:00:00</h1>
        </div>
        <div id="container2">
            <h1>TEMPORIZADOR</h1>
            <div>
                <label for="">Horas:</label>
                <div>
                    <input type="number" name="" id="hs_t" value="0">
                </div>
            </div>
            <div>
                <label for="">Minutos:</label>
                <div>
                    <input type="number" name="" id="min_t" value="0">
                </div>
            </div>
            <div>
                <label for="">Segundos:</label>
                <div>
                    <input type="number" name="" id="seg_t" value="0">
                </div>
            </div>
            <div>
                <div>
                    <label for="">Intervalo</label>
                </div>
                <div>
                    <input type="number" name="" id="interval_t" value="1000">
                </div>
            </div>
            <div style="display: block;">
                <input type="button" value="Iniciar" id="start_t">
                <input type="button" value="Detener" id="stop_t">
                <input type="button" value="Reiniciar" id="restart_t">
            </div>
            <h1 id="timer_t" class="tiempo">00:00:00</h1>
        </div>

    </div>
    <script src="./cronometro.js"></script>
    <script src="./temporizador.js"></script>
    <script src="./tema.js"></script>
</body>

</html>
